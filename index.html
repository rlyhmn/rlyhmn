<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RLY HMN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #888;
      --accent: #c8f060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Full-bleed video background ───────────────────────────── */
    .hero-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Subtle darkening overlay so UI stays readable */
    ..hero-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom, 
    rgba(0,0,0,0.5) 0%,   /* Darker at the top bar */
    rgba(0,0,0,0) 20%,    /* Transparent quickly */
    rgba(0,0,0,0) 80%,    /* Transparent through the middle */
    rgba(0,0,0,0.5) 100%  /* Darker at the email bar */
  );
  z-index: -1;
}
    /* ─────────────────────────────────────────────────────────── */

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      position: relative;
    }

    .left-nav { display: flex; gap: 32px; }

    .left-nav a {
      color: rgba(240,237,232,0.75);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .left-nav a:hover, .left-nav a.active { color: var(--text); }

    /* ── Glass icons — the SVG shape IS the glass ──────────────── */
    .top-socials {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
    }

    .social-link svg {
      width: 26px;
      height: 26px;
      overflow: visible;
      filter:
        drop-shadow(0 1px 4px rgba(0,0,0,0.6))
        drop-shadow(0 0 1px rgba(255,255,255,0.12));
      transition: filter 0.22s ease;
    }

    .social-link:hover { transform: translateY(-3px) scale(1.15); }

    .social-link:hover svg {
      filter:
        drop-shadow(0 5px 12px rgba(0,0,0,0.65))
        drop-shadow(0 0 8px rgba(200,230,255,0.2))
        drop-shadow(0 1px 0 rgba(255,255,255,0.6));
    }
    /* ─────────────────────────────────────────────────────────── */

    /* Spacer pushes mail bar to the bottom */
    .spacer { flex: 1; }

    .bottom-mail {
      padding: 24px 32px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: center;
    }

    .mail-form { display: flex; gap: 12px; align-items: center; }

    .mail-form input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 13px;
      width: 280px;
      outline: none;
      transition: border-color 0.2s;
    }

    .mail-form input::placeholder { color: rgba(255,255,255,0.4); }
    .mail-form input:focus { border-color: var(--accent); }

    .mail-form button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      color: #000;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .mail-form button:hover { transform: scale(1.02); }

    @media (max-width: 700px) {
      .top-bar { flex-direction: column; gap: 20px; padding: 20px; }
      .left-nav { gap: 20px; }
      .mail-form { flex-direction: column; width: 100%; }
      .mail-form input { width: 100%; }
      .top-socials { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
